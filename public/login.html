<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; }
.card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; }
h1 { font-size: 1.5rem; text-align: center; margin-bottom: .5rem; }
p { color: #888; font-size: .875rem; text-align: center; margin-bottom: 1.5rem; }
input { width: 100%; padding: .75rem 1rem; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; margin-bottom: 1rem; }
input:focus { border-color: #3b82f6; }
button { width: 100%; padding: .75rem; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
button:hover { background: #2563eb; }
.err { color: #f87171; font-size: .875rem; margin-bottom: .75rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>🔒 가이드 접근</h1>
  <p>비밀번호를 입력하세요</p>
  <form id="f">
    <input type="password" id="pw" placeholder="비밀번호" autofocus>
    <div class="err" id="err">비밀번호가 틀렸습니다</div>
    <button type="submit">확인</button>
  </form>
</div>
<script>
document.getElementById('f').onsubmit = async (e) => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({password: pw})
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
};
</script>
</body>
</html>
